<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planning admin - JDM Club Manager</title>

    <link rel="stylesheet" href="../styles/theme.css">
    <link rel="stylesheet" href="../styles/components.css">
</head>

<body>

<main class="page">

    <header class="page-header">
        <a href="administration.html" class="back-button">←</a>
        <h1>Planning admin</h1>
    </header>

    <section class="card">
        <h2>📅 Gestion du planning</h2>
        <p>
            Modifiez manuellement une séance, une annulation, des vacances ou ajoutez un événement.
        </p>
    </section>

    <section class="week-selector">
        <button class="week-button" id="semaine-precedente">←</button>

        <div class="week-title" id="titre-semaine">
            Semaine
        </div>

        <button class="week-button" id="semaine-suivante">→</button>
    </section>

    <section class="card">
        <div class="legend">
            <span><b class="dot ok"></b> Cours maintenu</span>
            <span><b class="dot off"></b> Pas de cours</span>
            <span><b class="dot cancel"></b> Cours annulé</span>
            <span><b class="dot ok has-info"></b> Message / information → Cliquez sur la case</span>
        </div>
    </section>

    <section id="planning-admin"></section>

    <section class="card" id="edition-planning" style="display:none;">
        <h2>Modifier la case</h2>

        <p id="case-selectionnee"></p>

        <select class="form-input" id="statut-case">
            <option value="cours">Cours maintenu</option>
            <option value="pas-cours">Pas de cours</option>
            <option value="annule">Cours annulé</option>
            <option value="evenement">Événement</option>
        </select>

        <input class="form-input" id="horaire-case" placeholder="Horaire ex : 10h00 - 12h00">

        <input class="form-input" id="titre-case" placeholder="Titre ex : Fête de la gym">

        <textarea class="form-input" id="message-case" placeholder="Message visible par les parents"></textarea>

        <label class="checkbox-row">
            <input type="checkbox" id="notifier-parents-case">
            Prévenir les parents du groupe
        </label>

        <button class="primary-button order-button" id="enregistrer-case">
            Enregistrer
        </button>

        <button class="secondary-button" id="annuler-edition">
            Annuler
        </button>
    </section>

</main>

<script src="../scripts/admin-planning.js"></script>

</body>

</html>
