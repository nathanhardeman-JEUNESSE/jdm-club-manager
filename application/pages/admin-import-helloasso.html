<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Import HelloAsso - JDM Club Manager</title>

    <link rel="stylesheet" href="../styles/theme.css">
    <link rel="stylesheet" href="../styles/components.css">
</head>
<body>

<main class="page">

    <header class="page-header">
        <a href="administration.html" class="back-button">←</a>
        <h1>Import</h1>
    </header>

    <section class="card">
        <h2>📥 Import HelloAsso</h2>

        <p>
            Importez ici le fichier Excel exporté depuis HelloAsso pour créer ou mettre à jour les adhérents et inscriptions de la saison.
        </p>
    </section>

    <section class="card">
        <h2>Fichier d'inscription</h2>

        <input type="file" id="helloasso-file" class="form-input" accept=".xlsx,.xls,.csv">

        <button class="primary-button order-button" id="import-button">
            Importer le fichier
        </button>
    </section>

    <section class="card">
        <h2>Résultat de l'import</h2>

        <div id="import-result">
            <p>Aucun fichier importé pour le moment.</p>
        </div>
    </section>

</main>

<script type="module" src="../scripts/auth-guard.js" data-roles="admin,super_admin" data-page="admin-import-helloasso"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="../scripts/admin-import-helloasso.js"></script>
<script type="module" src="../scripts/global-header.js"></script>

</body>
</html>
