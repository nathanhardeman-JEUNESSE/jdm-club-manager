<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trésorerie & cotisations - JDM Club Manager</title>
  <link rel="stylesheet" href="../styles/theme.css">
  <link rel="stylesheet" href="../styles/components.css">
  <link rel="stylesheet" href="../styles/global-header.css">
  <link rel="stylesheet" href="../styles/admin-tresorerie.css">
</head>
<body>
<main class="page tresorerie-page">
  <header class="page-header">
    <a href="administration.html" class="back-button">←</a>
    <h1>Trésorerie</h1>
  </header>

  <section class="card treasury-hero">
    <div>
      <p class="treasury-kicker">Saison en cours</p>
      <h2>💰 Cotisations & règlements</h2>
      <p>Suivi des paiements, aides, justificatifs et relances.</p>
    </div>
    <button id="exporter-excel" class="treasury-export-button" type="button">📊 Export Excel</button>
  </section>

  <section id="stats-cotisations" class="treasury-stats"></section>

  <section class="card treasury-filters">
    <label class="treasury-search">Rechercher
      <input id="recherche-aide" class="form-input" type="search"
             placeholder="Nom, prénom, groupe, ville, numéro..." autocomplete="off">
    </label>

    <label>Statut
      <select id="filtre-aide-statut" class="admin-select">
        <option value="">Tous les statuts</option>
        <option value="attente">🔴 En attente</option>
        <option value="partiel">🟠 Partiel</option>
        <option value="regle">🟢 Réglé</option>
        <option value="annule">⚫ Annulé / impayé</option>
      </select>
    </label>

    <label>Mode
      <select id="filtre-mode-paiement" class="admin-select">
        <option value="">Tous les modes</option>
        <option value="cb-helloasso">CB HelloAsso</option>
        <option value="cheque">Chèque</option>
        <option value="especes">Espèces</option>
        <option value="virement">Virement</option>
        <option value="passsport">Pass’Sport</option>
        <option value="cheque-sport">Chèque sport</option>
        <option value="aide-lomme">Aide Ville de Lomme</option>
        <option value="autre">Autre</option>
      </select>
    </label>

    <label>Dossiers
      <select id="filtre-dossiers" class="admin-select">
        <option value="">Tous</option>
        <option value="reste">Reste à payer</option>
        <option value="lomme">Résidents Lomme</option>
        <option value="justificatif-manquant">Justificatif manquant</option>
        <option value="reduction">Avec réduction / coupon</option>
      </select>
    </label>

    <button id="reinitialiser-filtres-tresorerie" type="button"
            class="secondary-button treasury-reset-button">Réinitialiser</button>
  </section>

  <section class="treasury-toolbar">
    <div id="resume-liste-tresorerie"></div>
    <button id="exporter-alertes" class="secondary-button" type="button">
      Exporter les impayés
    </button>
  </section>

  <section id="liste-alertes-cotisations"></section>


  <section class="card treasury-list-title treasury-donations-title">
    <h2>🎁 Dons à l’association</h2>
    <p>
      Les dons HelloAsso sont comptabilisés séparément
      des cotisations.
    </p>
  </section>

  <section id="liste-dons-helloasso"></section>

  <section class="card treasury-list-title">
    <h2>👥 Liste complète</h2>
    <p>Cliquez sur une fiche pour gérer ses règlements.</p>
  </section>

  <section id="liste-aide-licence"></section>
</main>

<script type="module" src="../scripts/auth-guard.js"
        data-roles="admin,super_admin,tresorier"
        data-page="admin-aide-licence"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script type="module" src="../scripts/admin-aide-licence.js"></script>
<script type="module" src="../scripts/global-header.js"></script>
</body>
</html>
