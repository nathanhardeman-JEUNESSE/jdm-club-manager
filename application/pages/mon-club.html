<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon club - JDM Club Manager</title>

    <link rel="stylesheet" href="../styles/theme.css">
    <link rel="stylesheet" href="../styles/components.css">
    <link rel="stylesheet" href="../styles/global-header.css">
</head>

<body>

<main class="page">

    <header class="page-header">
        <a href="accueil.html" class="back-button">←</a>
        <h1>Mon club</h1>
    </header>

    <section class="card">
        <h2 id="club-titre">La Jeunesse du Marais</h2>
        <p id="club-presentation"></p>
    </section>

    <section class="card">
        <h2>📖 Notre histoire</h2>
        <p id="club-histoire"></p>
    </section>

    <section class="card">
        <h2>💙 Nos valeurs</h2>
        <p id="club-valeurs"></p>
    </section>

    <section class="card">
        <h2>🤸 Nos disciplines</h2>
        <p id="club-disciplines"></p>
    </section>

    <section class="card">
        <h2>🏟️ Nos installations</h2>
        <p id="club-installations"></p>
    </section>

    <section class="card">
        <h2>📍 Informations pratiques</h2>
        <p><strong>Adresse :</strong> <span id="club-adresse"></span></p>
        <p><strong>Téléphone :</strong> <span id="club-telephone"></span></p>
        <p><strong>Email :</strong> <span id="club-email"></span></p>
        <p><strong>Horaires :</strong></p>
        <p id="club-horaires"></p>
    </section>

    <section class="social-row">
    <a id="lien-facebook" href="#" class="social-square" target="_blank" rel="noopener noreferrer">
        <img src="../images/facebook.png" alt="Facebook">
    </a>

    <a id="lien-instagram" href="#" class="social-square" target="_blank" rel="noopener noreferrer">
        <img src="../images/instagram.png" alt="Instagram">
    </a>

    <a id="lien-tiktok" href="#" class="social-square" target="_blank" rel="noopener noreferrer">
        <img src="../images/tiktok.png" alt="TikTok">
    </a>
        </section>

</main>

<script src="../scripts/mon-club.js"></script>
<script type="module" src="../scripts/global-header.js"></script>

</body>
</html>
