<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - JDM Club Manager</title>

    <link rel="stylesheet" href="../styles/theme.css">
    <link rel="stylesheet" href="../styles/components.css">
</head>
<body>

<main class="page">

    <header class="page-header">
        <a href="accueil.html" class="back-button">←</a>
        <h1>Contact</h1>
    </header>

    <section class="card">
        <h2>📞 Nous contacter</h2>
        <p id="contact-introduction"></p>
    </section>

    <section class="card">
        <h2>📍 Adresse</h2>
        <p id="contact-adresse"></p>
    </section>

    <section class="card">
        <h2>✉️ Coordonnées</h2>
        <p><strong>Téléphone :</strong> <span id="contact-telephone"></span></p>
        <p><strong>Email :</strong> <span id="contact-email"></span></p>
    </section>

    <section class="card">
        <h2>🕒 Horaires</h2>
        <p id="contact-horaires"></p>
    </section>

    <section class="card">
        <h2>👥 Contacts du club</h2>
        <p id="contact-responsables"></p>
    </section>

    <section class="social-row">
        <a id="contact-facebook" href="#" class="social-square" target="_blank" rel="noopener noreferrer">f</a>
        <a id="contact-instagram" href="#" class="social-square" target="_blank" rel="noopener noreferrer">◎</a>
        <a id="contact-tiktok" href="#" class="social-square" target="_blank" rel="noopener noreferrer">♪</a>
    </section>

</main>

<script src="../scripts/contact.js"></script>

</body>
</html>
