<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produit - JDM Club Manager</title>

    <link rel="stylesheet" href="../styles/theme.css">
    <link rel="stylesheet" href="../styles/components.css">
</head>
<body>

<main class="page">

    <header class="page-header">
        <a href="boutique-accessoires.html" class="back-button">←</a>
        <h1>Tee-shirt officiel</h1>
    </header>

    <section class="product-detail">

        <img src="../images/produits/teeshirt jeunesse blanc 2.jpg" alt="Tee-shirt officiel JDM" class="product-detail-image">

        <h2 id="product-name"></h2>

        <p class="product-price" id="product-price"></p>

        <p>
            <p id="product-description"></p>
        </p>

        <h3>Couleur</h3>

        <div class="option-row">
            <button class="option-button active">Blanc</button>
            <button class="option-button">Noir</button>
        </div>

        <h3>Taille</h3>

        <div class="option-row">
            <button class="option-button">5-6 ans</button>

    <button class="option-button">7-8 ans</button>

            <button class="option-button">8-9 ans</button>

    <button class="option-button">10-11 ans</button>

    <button class="option-button">12-13 ans</button>

    <button class="option-button">14-15 ans</button>

    <button class="option-button">XS</button>

    <button class="option-button">S</button>

    <button class="option-button active">M</button>

    <button class="option-button">L</button>

    <button class="option-button">XL</button>

    <button class="option-button">XXL</button>

</div>

        <h3>Quantité</h3>

        <div class="quantity-row">
            <button class="quantity-button">-</button>
            <span>1</span>
            <button class="quantity-button">+</button>
        </div>

        <button class="primary-button order-button">
            Commander
        </button>

    </section>

</main>
<script src="../scripts/data.js"></script>
<script src="../scripts/produit.js"></script>
<script type="module" src="../scripts/global-header.js"></script>
</body>
</html>
