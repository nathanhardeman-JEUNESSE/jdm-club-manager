<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planning - JDM Club Manager</title>

    <link rel="stylesheet" href="../styles/theme.css">
    <link rel="stylesheet" href="../styles/components.css">
</head>

<body>

<main class="page">

    <header class="page-header">
        <a href="accueil.html" class="back-button">←</a>
        <h1>Planning</h1>
    </header>

    <section class="card">
        <h2>📅 Planning des entraînements</h2>
        <p>
            Retrouvez ici les horaires des groupes du club.
        </p>
    </section>

    <section class="card">
        <div class="legend">
            <span><b class="dot ok"></b> Cours maintenu</span>
            <span><b class="dot off"></b> Pas de cours</span>
            <span><b class="dot cancel"></b> Cours annulé</span>
            <span><b class="dot ok has-info"></b> Message / information → Cliquez sur la case</span>
        </div>
    </section>

    <section class="week-selector">
        <button class="week-button" id="semaine-precedente">←</button>

        <div class="week-title" id="titre-semaine">
            Semaine
        </div>

        <button class="week-button" id="semaine-suivante">→</button>
    </section>

    <section id="planning-public"></section>


<script src="../scripts/planning.js"></script>

</body>

</html>
