<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groupes - JDM Club Manager</title>

    <link rel="stylesheet" href="../styles/theme.css">
    <link rel="stylesheet" href="../styles/components.css">
</head>
<body>

<main class="page">

    <header class="page-header">
        <a href="administration.html" class="back-button">←</a>
        <h1>Groupes</h1>
    </header>

    <section class="card">
        <h2>➕ Ajouter un groupe</h2>

        <input class="form-input" id="nom-groupe" placeholder="Nom du groupe">

    <select class="form-input" id="sexe-groupe">
        <option value="Mixte">♂️♀️ Mixte</option>
        <option value="Filles">♀️ Filles</option>
        <option value="Garçons">♂️ Garçons</option>
    </select>

    <select class="form-input" id="type-groupe">
        <option value="Loisir">Loisir</option>
        <option value="Compétition">Compétition</option>
    </select>

    <select class="form-input" id="federation-groupe">
        <option value="FFG">FFG</option>
        <option value="UFOLEP">UFOLEP</option>
        <option value="Libre">-</option>
    </select>

    <input class="form-input" id="annee-min" placeholder="Année naissance min ex : 2016">
    <input class="form-input" id="annee-max" placeholder="Année naissance max ex : 2019">
    <input class="form-input" id="effectif-max" placeholder="Effectif max">

    <h3>Jours d'entraînement</h3>

<div id="jours-groupe">

    <label class="checkbox-row">
        <input type="checkbox" name="joursGroupe" value="Lundi"> Lundi
    </label>
    <input class="form-input" name="horaireLundi" placeholder="Horaire lundi ex : 18h - 19h30">

    <label class="checkbox-row">
        <input type="checkbox" name="joursGroupe" value="Mardi"> Mardi
    </label>
    <input class="form-input" name="horaireMardi" placeholder="Horaire mardi ex : 18h - 19h30">

    <label class="checkbox-row">
        <input type="checkbox" name="joursGroupe" value="Mercredi"> Mercredi
    </label>
    <input class="form-input" name="horaireMercredi" placeholder="Horaire mercredi ex : 18h - 19h30">

    <label class="checkbox-row">
        <input type="checkbox" name="joursGroupe" value="Jeudi"> Jeudi
    </label>
    <input class="form-input" name="horaireJeudi" placeholder="Horaire jeudi ex : 18h - 19h30">

    <label class="checkbox-row">
        <input type="checkbox" name="joursGroupe" value="Vendredi"> Vendredi
    </label>
    <input class="form-input" name="horaireVendredi" placeholder="Horaire vendredi ex : 18h - 19h30">

    <label class="checkbox-row">
        <input type="checkbox" name="joursGroupe" value="Samedi"> Samedi
    </label>
    <input class="form-input" name="horaireSamedi" placeholder="Horaire samedi ex : 18h - 19h30">

</div>


        <h3>👨‍🏫 Coach(s) du groupe</h3>
    <div id="liste-coachs-groupe"></div>

        <input class="form-input" id="whatsapp-groupe" placeholder="Lien WhatsApp du groupe">

        <button class="primary-button order-button" id="ajouter-groupe">
            Ajouter le groupe
        </button>

    </section>

    <section id="liste-groupes"></section>

</main>
<section class="card">
    <h2>🔎 Rechercher un adhérent</h2>

    <input class="form-input" id="recherche-adherent" placeholder="Rechercher par nom, prénom, âge ou groupe">

    <select class="form-input" id="filtre-groupe-adherent">
        <option value="">Tous les groupes</option>
    </select>
</section>
<script src="../scripts/admin-groupes.js"></script>

</body>
</html>
