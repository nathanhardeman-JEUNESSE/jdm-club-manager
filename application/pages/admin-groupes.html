<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groupes - JDM Club Manager</title>

    <link rel="stylesheet" href="../styles/theme.css">
    <link rel="stylesheet" href="../styles/components.css">
</head>
<body>

<main class="page">

    <header class="page-header">
        <a href="administration.html" class="back-button">←</a>
        <h1>Groupes</h1>
    </header>

    <section class="card">
        <h2>➕ Ajouter un groupe</h2>

        <input class="form-input" id="nom-groupe" placeholder="Nom du groupe">

    <select class="form-input" id="sexe-groupe">
        <option value="Mixte">♂️♀️ Mixte</option>
        <option value="Filles">♀️ Filles</option>
        <option value="Garçons">♂️ Garçons</option>
    </select>

    <select class="form-input" id="type-groupe">
        <option value="Loisir">Loisir</option>
        <option value="Compétition">Compétition</option>
    </select>

    <select class="form-input" id="federation-groupe">
        <option value="FFG">FFG</option>
        <option value="UFOLEP">UFOLEP</option>
        <option value="Libre">-</option>
    </select>

    <input class="form-input" id="annee-min" placeholder="Année naissance min ex : 2016">
    <input class="form-input" id="annee-max" placeholder="Année naissance max ex : 2019">
    <input class="form-input" id="effectif-max" placeholder="Effectif max">


<h3>Jours d'entraînement</h3>

<div class="admin-week-grid" id="planning-groupe-form">
    <div class="admin-day-cell" data-jour="Lundi" data-champ="horaireLundi">
        <strong>Lun</strong>
        <span>-</span>
    </div>

    <div class="admin-day-cell" data-jour="Mardi" data-champ="horaireMardi">
        <strong>Mar</strong>
        <span>-</span>
    </div>

    <div class="admin-day-cell" data-jour="Mercredi" data-champ="horaireMercredi">
        <strong>Mer</strong>
        <span>-</span>
    </div>

    <div class="admin-day-cell" data-jour="Jeudi" data-champ="horaireJeudi">
        <strong>Jeu</strong>
        <span>-</span>
    </div>

    <div class="admin-day-cell" data-jour="Vendredi" data-champ="horaireVendredi">
        <strong>Ven</strong>
        <span>-</span>
    </div>

    <div class="admin-day-cell" data-jour="Samedi" data-champ="horaireSamedi">
        <strong>Sam</strong>
        <span>-</span>
    </div>
</div>

<section class="card" id="edition-horaire-groupe" style="display:none;">
    <h2 id="titre-edition-horaire">Horaire</h2>

    <input class="form-input" id="horaire-selectionne" placeholder="Ex : 18h00 - 19h30">

    <button class="primary-button order-button" id="enregistrer-horaire-groupe">
        Enregistrer l'horaire
    </button>

    <button class="secondary-button" id="supprimer-horaire-groupe">
        Supprimer l'horaire
    </button>
</section>


        <h3>👨‍🏫 Coach(s) du groupe</h3>
    <div id="liste-coachs-groupe"></div>

        <input class="form-input" id="whatsapp-groupe" placeholder="Lien WhatsApp du groupe">

        <button class="primary-button order-button" id="ajouter-groupe">
            Ajouter le groupe
        </button>

    </section>

    <section id="liste-groupes"></section>

</main>
<section class="card">
    <h2>🔎 Rechercher un adhérent</h2>

    <input class="form-input" id="recherche-adherent" placeholder="Rechercher par nom, prénom, âge ou groupe">

    <select class="form-input" id="filtre-groupe-adherent">
        <option value="">Tous les groupes</option>
    </select>
</section>
<script src="../scripts/admin-groupes.js"></script>

</body>
</html>
