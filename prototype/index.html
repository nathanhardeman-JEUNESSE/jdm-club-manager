<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="style.css">
  <title>JDM Club Manager</title>
</head>
<body>
  <main class="login-screen">
    <div class="card">
      <img src="logo-jdm.png" alt="Logo La Jeunesse du Marais" class="logo">

      <h1>JDM Club Manager</h1>
      <p class="subtitle">La Jeunesse du Marais</p>

      <h2>Connexion</h2>

      <label>Email</label>
      <input type="email" placeholder="parent@email.fr">

      <label>Mot de passe</label>
      <input type="password" placeholder="Mot de passe">

      <button>Se connecter</button>

      <div class="links">
        <a href="#">Créer un compte</a>
        <a href="#">Mot de passe oublié ?</a>
      </div>
    </div>
  </main>
</body>
</html>
